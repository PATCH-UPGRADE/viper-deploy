name: viper

networks:
  viper_stack:
    driver: bridge

services:
  postgres:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viper
      POSTGRES_NON_DEFAULT_DB: blueflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: 
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - viper_stack

  viper:
    image: ghcr.io/patch-upgrade/viper:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/viper
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-not-for-production-change-me}
      SMTP_FROM: ${SMTP_FROM:-Viper <noreply@viper-xi.app>}
      SMTP_HOST: ${SMTP_HOST:-SMTP-host-not-set}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-smtp-user}
      SMTP_PASS: ${SMTP_PASS:-smtp-password}
      RESEND_API_KEY: ${RESEND_API_KEY:-false}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-false}
      DOMAIN_WHITELIST: ${DOMAIN_WHITELIST:-domains-not-set.fake-tld}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-fake-anthropic-key}
      HELM_URL: ${HELM_URL:-helm-url}
      HELM_TOKEN: ${HELM_TOKEN:-helm-token}
      NETWORK_FLOW_URL: ${NETWORK_FLOW_URL:-network-flow-url}
      NETWORK_FLOW_TOKEN: ${NETWORK_FLOW_TOKEN:-network-flow-token}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-*}
      N8N_KEY: ${N8N_KEY:-n8n-key}
      N8N_AI_SYNC_URL: ${N8N_AI_SYNC_URL:-n8n-ai-sync-url}
      INNGEST_DEV: 1
      INNGEST_BASE_URL: http://inngest:8288
      PRISMA_CLIENT_ENGINE_TYPE: binary
    volumes:
      - viper-stamps:/srv/stamps
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - viper_stack

  inngest:
    image: docker.io/inngest/inngest:v1.17.2
    environment:
      INNGEST_BOOTSTRAP_URL: http://viper:3000/api/inngest
      INNGEST_DEV: true
      INNGEST_PORT: 8288
    ports:
      - "8288:8288"
    entrypoint: ["/bin/sh", "-c"]
    command: ["inngest dev -u $$INNGEST_BOOTSTRAP_URL"]
    depends_on:
      - viper
    networks:
      - viper_stack

  blueflow-postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: blueflow
      POSTGRES_USER: blueflow
      POSTGRES_PASSWORD: blueflow
    volumes:
      - blueflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - viper_stack

  blueflow-redis:
    image: docker.io/redis:7-alpine
    volumes:
      - blueflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - 6379:6379
    networks:
      - viper_stack

  blueflow:
    image: docker.io/virtalabsinc/blueflow:latest
    volumes:
      - ./blueflow-init:/blueflow-init:ro
    depends_on:
      blueflow-postgres:
        condition: service_healthy
      blueflow-redis:
        condition: service_healthy
    environment:
      BASE_URL: http://blueflow:8000
      DATABASE_URL: postgresql://blueflow:blueflow@blueflow-postgres:5432/blueflow
      RESDIS_URL: resdis://blueflow-redis:6379/0
      CELERY_BROKER_URL: redis://blueflow-redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: true
      DJANGO_SETTINGS_MODULE: project.settings.development
      DJANGO_SECRET_KEY: not-for-production
      DJANGO_ALLOWED_HOSTS: blueflow,localhost,127.0.0.1,*
      VIPER_CALLBACK_ALLOWED_HOSTS: viper
      VIPER_CALLBACK_TIMEOUT: 30
    healthcheck:
      test: ['CMD-SHELL', '/app/.venv/bin/python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://127.0.0.1:8000/api/\").getcode() < 400 else 1)"']
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 30
    ports: 
      - "8000:8000"
    networks:
      - viper_stack

  blueflow-worker:
    image: docker.io/virtalabsinc/blueflow:latest
    depends_on:
      blueflow:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://blueflow:blueflow@blueflow-postgres:5432/blueflow
      REDIS_URL: redis://blueflow-redis:6379/0
      CELERY_BROKER_URL: redis://blueflow-redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: true
      DJANGO_SETTINGS_MODULE: project.settings.development
      SECRET_KEY: not-for-production
    command:  ["uv", "run", "celery", "-A", "blueflow.celery", "worker", "-l", "info"]
    networks:
      - viper_stack
    
  tapirxl:
    image: docker.io/virtalabsinc/tapirxl:demo-latest
    volumes:
      - ./pcap:/pcap:ro
      - ./blueflow-init:/blueflow-init:ro
      - tapirxl-spool:/var/lib/vector/data
    depends_on:
      blueflow:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    environment:
      BLUEFLOW_URL: http://blueflow:8000
      BLUEFLOW_TOKEN: demo-tapirxl-token-not-for-production
      TAPIRXL_MODE: pcap
      TAPIRXL_PCAP_PATH: /pcap/synthetic_philips_demo.pcap
      TAPIRXL_INTERFACE: eth0
    profiles:
      - tapirxl
    networks:
      - viper_stack

volumes:
  pgdata:
  viper-stamps:
  blueflow-pgdata:
  blueflow-redis-data:
  tapirxl-spool:
